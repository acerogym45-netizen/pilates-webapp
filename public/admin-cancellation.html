<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해지 신청 관리 - 청주SK뷰자이 필라테스</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <header class="admin-header">
            <h1><i class="fas fa-user-times"></i> 해지 신청 관리</h1>
            <p>마스터플랜리소스 × 청주SK뷰자이</p>
            <div class="nav-tabs">
                <a href="admin-main.html" class="nav-tab">
                    <i class="fas fa-file-contract"></i> 신청 관리
                </a>
                <a href="admin-cancellation.html" class="nav-tab active">
                    <i class="fas fa-user-times"></i> 해지 관리
                </a>
                <a href="admin-inquiry.html" class="nav-tab">
                    <i class="fas fa-comment-dots"></i> 문의 관리
                </a>
                <a href="admin-notices.html" class="nav-tab">
                    <i class="fas fa-bullhorn"></i> 공지사항
                </a>
                <a href="admin-instructors.html" class="nav-tab">
                    <i class="fas fa-user-tie"></i> 강사 관리
                </a>
                <a href="admin-programs.html" class="nav-tab">
                    <i class="fas fa-clipboard-list"></i> 프로그램 관리
                </a>
                <a href="admin-complex.html" class="nav-tab">
                    <i class="fas fa-building"></i> 단지 관리
                </a>
                <a href="index.html" class="nav-tab" target="_blank">
                    <i class="fas fa-home"></i> 입주자 페이지
                </a>
            </div>
        </header>

        <!-- Stats Section -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-icon pending">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-info">
                    <h3 id="pendingCount">0</h3>
                    <p>접수</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon processing">
                    <i class="fas fa-spinner"></i>
                </div>
                <div class="stat-info">
                    <h3 id="processingCount">0</h3>
                    <p>처리중</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon approved">
                    <i class="fas fa-check"></i>
                </div>
                <div class="stat-info">
                    <h3 id="completedCount">0</h3>
                    <p>완료</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon rejected">
                    <i class="fas fa-ban"></i>
                </div>
                <div class="stat-info">
                    <h3 id="rejectedCount">0</h3>
                    <p>반려</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon total">
                    <i class="fas fa-list"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalCount">0</h3>
                    <p>전체</p>
                </div>
            </div>
        </section>

        <!-- Filter Section -->
        <section class="filter-section">
            <div class="filter-group">
                <label for="statusFilter">상태 필터:</label>
                <select id="statusFilter" onchange="filterCancellations()">
                    <option value="all">전체</option>
                    <option value="접수" selected>접수</option>
                    <option value="처리중">처리중</option>
                    <option value="완료">완료</option>
                    <option value="반려">반려</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="searchInput">검색:</label>
                <input type="text" id="searchInput" placeholder="이름, 동/호수 검색..." onkeyup="filterCancellations()">
            </div>
            <button class="btn-refresh" onclick="loadCancellations()">
                <i class="fas fa-sync-alt"></i> 새로고침
            </button>
            <button class="btn-export" onclick="exportToCSV()">
                <i class="fas fa-download"></i> CSV 다운로드
            </button>
        </section>

        <!-- Cancellations List -->
        <section class="contracts-section">
            <div class="loading" id="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>데이터 로딩 중...</p>
            </div>
            
            <div class="empty-state" id="emptyState" style="display: none;">
                <i class="fas fa-inbox"></i>
                <p>해지 신청이 없습니다</p>
            </div>
            
            <div class="contracts-list" id="cancellationsList" style="display: none;"></div>
        </section>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content detail">
            <div class="modal-header">
                <h2><i class="fas fa-file-alt"></i> 해지 신청 상세</h2>
                <button class="modal-close" onclick="closeDetailModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div id="detailContent"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-delete" onclick="deleteCancellation(currentCancellationId)">
                    <i class="fas fa-trash"></i> 삭제
                </button>
                <button class="btn btn-secondary" onclick="closeDetailModal()">닫기</button>
            </div>
        </div>
    </div>

    <script src="js/admin-cancellation.js"></script>
</body>
</html>
