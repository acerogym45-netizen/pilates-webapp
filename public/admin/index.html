<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>필라테스 신청 관리 - 관리사무소</title>
    <link rel="stylesheet" href="./css/admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <header class="admin-header">
            <h1><i class="fas fa-clipboard-list"></i> 필라테스 신청 관리</h1>
            <p>마스터플랜리소스 × 청주SK뷰자이</p>
            <div class="nav-tabs">
                <a href="./" class="nav-tab active">
                    <i class="fas fa-file-contract"></i> 신청 관리
                </a>
                <a href="./inquiry.html" class="nav-tab">
                    <i class="fas fa-comment-dots"></i> 문의 관리
                </a>
            </div>
        </header>

        <!-- Stats Section -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-icon pending">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-info">
                    <h3 id="pendingCount">0</h3>
                    <p>대기중</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon approved">
                    <i class="fas fa-check"></i>
                </div>
                <div class="stat-info">
                    <h3 id="approvedCount">0</h3>
                    <p>승인</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon rejected">
                    <i class="fas fa-times"></i>
                </div>
                <div class="stat-info">
                    <h3 id="rejectedCount">0</h3>
                    <p>거부</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon total">
                    <i class="fas fa-list"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalCount">0</h3>
                    <p>전체</p>
                </div>
            </div>
        </section>

        <!-- Filter Section -->
        <section class="filter-section">
            <div class="filter-group">
                <label for="statusFilter">상태 필터:</label>
                <select id="statusFilter" onchange="filterContracts()">
                    <option value="all">전체</option>
                    <option value="대기중" selected>대기중</option>
                    <option value="승인">승인</option>
                    <option value="거부">거부</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="searchInput">검색:</label>
                <input type="text" id="searchInput" placeholder="이름, 동/호수 검색..." onkeyup="filterContracts()">
            </div>
            <button class="btn-refresh" onclick="loadContracts()">
                <i class="fas fa-sync-alt"></i> 새로고침
            </button>
            <button class="btn-export" onclick="exportToCSV()">
                <i class="fas fa-download"></i> CSV 다운로드
            </button>
        </section>

        <!-- Contracts List -->
        <section class="contracts-section">
            <div id="loadingSpinner" class="loading" style="display: none;">
                <i class="fas fa-spinner fa-spin"></i> 불러오는 중...
            </div>
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fas fa-inbox"></i>
                <p>신청 내역이 없습니다.</p>
            </div>
            <div id="contractsList" class="contracts-list">
                <!-- Dynamically populated -->
            </div>
        </section>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content detail">
            <div class="modal-header">
                <h2><i class="fas fa-file-contract"></i> 신청서 상세정보</h2>
                <button class="modal-close" onclick="closeDetailModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="detailContent">
                <!-- Dynamically populated -->
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeDetailModal()">닫기</button>
            </div>
        </div>
    </div>

    <script src="./js/admin.js"></script>
</body>
</html>
